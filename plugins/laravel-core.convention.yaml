name: laravel-core
version: 1.0.0
description: Laravel core framework conventions — models, migrations, routes, events, policies, form requests, services, config arrays

detect:
  files:
    - artisan
    - composer.json
  contains:
    composer.json: "laravel/framework"

node_kinds:
  - model
  - migration
  - form_request
  - policy
  - event
  - listener
  - service
  - config_array
  - route_definition

rules:
  - name: service-class
    description: Laravel service/client/integration classes that act as reusable application services
    match:
      language: php
      file_pattern: "app/{Services,Clients,Integrations}/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @service_name)
    creates:
      - node:
          file: "{current_file}"
          kind: service
          metadata:
            class: "@service_name"

  - name: config-array
    description: PHP config files that return arrays
    match:
      language: php
      file_pattern: "config/**/*.php"
      pattern: |
        (return_statement
          (array_creation_expression) @config_array)
    creates:
      - node:
          file: "{current_file}"
          kind: config_array
          metadata:
            returns: array

  - name: eloquent-model-class
    description: Eloquent model classes under app/Models
    match:
      language: php
      file_pattern: "app/Models/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @model_name)
    creates:
      - node:
          file: "{current_file}"
          kind: model
          metadata:
            class: "@model_name"

  - name: migration-schema-change
    description: Migration files that create or update database tables
    match:
      language: php
      file_pattern: "database/migrations/*.php"
      pattern: |
        (scoped_call_expression
          scope: (name) @_schema (#eq? @_schema "Schema")
          name: (name) @method (#match? @method "^(create|table)$")
          arguments: (arguments
            (argument
              (string (string_content) @table_name))))
    creates:
      - node:
          file: "{current_file}"
          kind: migration
          metadata:
            table: "@table_name"
            method: "@method"

  - name: form-request-class
    description: Laravel FormRequest classes under app/Http/Requests
    match:
      language: php
      file_pattern: "app/Http/Requests/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @request_name)
    creates:
      - node:
          file: "{current_file}"
          kind: form_request
          metadata:
            class: "@request_name"

  - name: policy-class
    description: Laravel policy classes under app/Policies
    match:
      language: php
      file_pattern: "app/Policies/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @policy_name)
    creates:
      - node:
          file: "{current_file}"
          kind: policy
          metadata:
            class: "@policy_name"

  - name: event-class
    description: Laravel event classes under app/Events
    match:
      language: php
      file_pattern: "app/Events/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @event_name)
    creates:
      - node:
          file: "{current_file}"
          kind: event
          metadata:
            class: "@event_name"

  - name: listener-class
    description: Laravel listener classes under app/Listeners
    match:
      language: php
      file_pattern: "app/Listeners/**/*.php"
      pattern: |
        (class_declaration
          name: (name) @listener_name)
    creates:
      - node:
          file: "{current_file}"
          kind: listener
          metadata:
            class: "@listener_name"

  - name: route-controller
    description: Route definitions linking URLs to controller classes
    match:
      language: php
      file_pattern: "routes/*.php"
      pattern: |
        (scoped_call_expression
          scope: (name) @_route (#eq? @_route "Route")
          name: (name) @method (#match? @method "^(get|post|put|patch|delete|any|match)$")
          arguments: (arguments
            (argument
              (string (string_content) @path))
            (argument
              (array_creation_expression
                (array_element_initializer
                  (class_constant_access_expression
                    (name) @class_name))))))
    creates:
      - edge:
          from: current_file
          to:
            resolve_class: "@class_name"
          relationship: routes_to
          metadata:
            method: "@method"
            path: "@path"

  - name: route-closure-group
    description: Route group prefixes
    match:
      language: php
      file_pattern: "routes/*.php"
      pattern: |
        (scoped_call_expression
          scope: (name) @_route (#eq? @_route "Route")
          name: (name) @method (#eq? @method "group")
          arguments: (arguments
            (argument
              (array_creation_expression
                (array_element_initializer
                  (string (string_content) @key (#eq? @key "prefix"))
                  (string (string_content) @prefix_value))))))
    creates:
      - node:
          file: "{current_file}"
          kind: route_definition
          metadata:
            prefix: "@prefix_value"

  - name: eloquent-has-many
    description: Eloquent hasMany relationship linking models
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (member_call_expression
          object: (variable_name) @obj (#eq? @obj "$this")
          name: (name) @method (#eq? @method "hasMany")
          arguments: (arguments
            (argument
              (class_constant_access_expression
                (name) @related_model
                (name) @_const (#eq? @_const "class")))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@related_model"
          relationship: has_many

  - name: eloquent-belongs-to
    description: Eloquent belongsTo relationship
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (member_call_expression
          object: (variable_name) @obj (#eq? @obj "$this")
          name: (name) @method (#eq? @method "belongsTo")
          arguments: (arguments
            (argument
              (class_constant_access_expression
                (name) @related_model
                (name) @_const (#eq? @_const "class")))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@related_model"
          relationship: belongs_to

  - name: eloquent-has-one
    description: Eloquent hasOne relationship
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (member_call_expression
          object: (variable_name) @obj (#eq? @obj "$this")
          name: (name) @method (#eq? @method "hasOne")
          arguments: (arguments
            (argument
              (class_constant_access_expression
                (name) @related_model
                (name) @_const (#eq? @_const "class")))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@related_model"
          relationship: has_one

  - name: eloquent-belongs-to-many
    description: Eloquent belongsToMany (pivot) relationship
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (member_call_expression
          object: (variable_name) @obj (#eq? @obj "$this")
          name: (name) @method (#eq? @method "belongsToMany")
          arguments: (arguments
            (argument
              (class_constant_access_expression
                (name) @related_model
                (name) @_const (#eq? @_const "class")))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@related_model"
          relationship: belongs_to_many

  - name: eloquent-morph-many
    description: Eloquent morphMany polymorphic relationship
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (member_call_expression
          object: (variable_name) @obj (#eq? @obj "$this")
          name: (name) @method (#eq? @method "morphMany")
          arguments: (arguments
            (argument
              (class_constant_access_expression
                (name) @related_model
                (name) @_const (#eq? @_const "class")))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@related_model"
          relationship: morph_many

  - name: model-to-migration
    description: Links models to their migration files by table name
    match:
      language: php
      file_pattern: "app/Models/*.php"
      pattern: |
        (property_declaration
          (property_element
            name: (variable_name) @var (#eq? @var "$table")
            default_value: (string (string_content) @table_name)))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_migration: "@table_name"
          relationship: migrated_by

  - name: form-request-usage
    description: Type-hinted FormRequest in method parameters
    match:
      language: php
      pattern: |
        (formal_parameters
          (simple_parameter
            type: (named_type (name) @request_class)
            (#match? @request_class "Request$")))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@request_class"
          relationship: validates_with

  - name: event-dispatch
    description: Event class dispatching
    match:
      language: php
      pattern: |
        (scoped_call_expression
          scope: (name) @event_class
          name: (name) @method (#eq? @method "dispatch"))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@event_class"
          relationship: dispatches

  - name: event-listener-binding
    description: Event-to-listener bindings in EventServiceProvider
    match:
      language: php
      file_pattern: "app/Providers/*EventServiceProvider*.php"
      pattern: |
        (array_element_initializer
          (class_constant_access_expression
            (name) @event_class
            (name) @c1 (#eq? @c1 "class"))
          (array_creation_expression
            (array_element_initializer
              (class_constant_access_expression
                (name) @listener_class
                (name) @c2 (#eq? @c2 "class")))))
    creates:
      - edge:
          from:
            resolve_class: "@event_class"
          to:
            resolve_class: "@listener_class"
          relationship: handled_by

  - name: policy-authorization
    description: Policy methods that authorize model operations
    match:
      language: php
      file_pattern: "app/Policies/*.php"
      pattern: |
        (method_declaration
          name: (name) @method_name
          parameters: (formal_parameters
            (simple_parameter
              type: (named_type (name) @model_class)
              (#not-match? @model_class "^(User|Request)$"))))
    creates:
      - edge:
          from: current_symbol
          to:
            resolve_class: "@model_class"
          relationship: authorizes
