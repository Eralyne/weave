name: laravel-actions
version: 1.0.0
description: lorisleiva/laravel-actions conventions — Actions as controllers, jobs, listeners

detect:
  files:
    - composer.json
  contains:
    composer.json: "lorisleiva/laravel-actions"

node_kinds:
  - action

rules:
  - name: action-as-controller-route
    description: Actions registered as route controllers
    match:
      language: php
      file_pattern: "routes/*.php"
      pattern: |
        (member_call_expression
          name: (name) @method (#match? @method "^(get|post|put|patch|delete|any|match)$")
          arguments: (arguments
            (string (string_content) @path)
            (class_constant_access_expression
              (name) @action_class
              (name) @const (#eq? @const "class"))))
    creates:
      - edge:
          from: current_file
          to:
            resolve_class: "@action_class"
          relationship: routes_to
          metadata:
            method: "@method"
            path: "@path"
      - node:
          file: "app/Actions/{@action_class}.php"
          kind: action

  - name: action-as-object-trait
    description: Detect classes using AsAction trait
    match:
      language: php
      file_pattern: "app/Actions/**/*.php"
      pattern: |
        (use_declaration
          (name) @trait (#match? @trait "AsAction"))
    creates:
      - node:
          file: "{current_file}"
          kind: action
